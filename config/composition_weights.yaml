# Stage composition weights for random circuit generation (ADR-007 D8).
#
# single_stage: weights for compose_random_circuit (num_stages=1)
# signal_weights / load_weights: per-pool weights for generate_composed_circuit
#
# Values are relative — they are normalized to sum to 1.0 at runtime.

single_stage:
  cs_resistor:       4    # CS with drain resistor (most common)
  cs_current_source: 1    # CS with ideal current source load
  sf_resistor:       2    # Source follower with source resistor
  cg_resistor:       1    # Common-gate with drain resistor

# Multi-stage pool weights (used by generate_composed_circuit)
signal_weights:
  cs_core: 5    # Common-source: high gain, most common first/middle stage
  sf_core: 3    # Source follower: unity gain buffer, good last stage
  cg_core: 2    # Common-gate: good cascode / second stage

load_weights:
  resistor_load:       6    # Drain resistor: simple, predictable Rout
  current_source_load: 4    # Ideal current source: high Rout, high gain
